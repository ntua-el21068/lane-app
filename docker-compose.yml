services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lane
      POSTGRES_USER: lane
      POSTGRES_PASSWORD: lane
    ports:
      - "5432:5432"
    volumes:
      - lane_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lane"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/lane
      DB_USERNAME: lane
      DB_PASSWORD: lane
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  lane_db_data:
