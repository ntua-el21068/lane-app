spring:
  application:
    name: lane-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lane}
    username: ${DB_USERNAME:lane}
    password: ${DB_PASSWORD:lane}

  jpa:
    hibernate:
      ddl-auto: update # fine for early development; switch to migrations (Flyway) before Phase 2
    show-sql: false

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

lane:
  llm:
    provider-url: https://api.groq.com/openai/v1/chat/completions
    model: llama-3.3-70b-versatile
    api-key: ${GROQ_API_KEY}

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:lane-test
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
